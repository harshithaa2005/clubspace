<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enroll in Event</title>
  <link rel="stylesheet" href="index.css">
  <style>
    .enroll-section {
      padding: 160px 20px 80px 20px;
      min-height: calc(100vh - 100px);
    }
    .container {
      max-width: 450px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.03);
      padding: 40px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      font-size: 32px;
      font-weight: 800;
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      margin-bottom: 30px;
    }

    form {
      text-align: center;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 20px;
    }

    button {
      margin-top: 10px;
      width: 100%;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header>
    <nav class="navbar">
      <div class="logo">ClubSpace</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="club.html">Clubs</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="signin.html">Login</a></li>
      </ul>
    </nav>
  </header>

  <!-- Enrollment Form -->
  <div class="enroll-section">
    <div class="container animate-fade-up">
      <h1>Enroll in Event</h1>
      <form action="/submit-event" method="POST">
        <input type="hidden" name="event" value="Event 2025">
        <input type="text" id="name" name="name" placeholder="Full Name" required>
        <input type="email" id="email" name="email" placeholder="Email Address" required>
        <input type="tel" id="phone" name="phone" placeholder="Phone Number" required>
        <input type="text" id="department" name="department" placeholder="Department" required>
        <textarea id="comments" name="comments" rows="3" placeholder="Any special talents or participation ideas?" class="form-control"></textarea>
  
        <button type="submit" class="btn btn-buy">Join the Event!</button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-address">
        <h3>Contact Us</h3>
        <p>SRKREC <br>China Amiram,Bhimavaram,<br>Andhra Pradesh,India.<br>Email: principal@srkrec.ac.in<br>Phone: 08816-223332(Office).</p>
      </div>
      <div class="footer-links">
        <h3>Quick Links</h3>
        <ul>
          <li><a href="club.html">Clubs</a></li>
          <li><a href="events.html">Events</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
      <div class="footer-social">
        <h3>Follow Us</h3>
        <div class="social-icons">
          <a href="https://facebook.com" target="_blank"><img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-new.png" alt="Facebook"/></a>
          <a href="https://twitter.com" target="_blank"><img src="https://img.icons8.com/ios-filled/50/ffffff/twitter.png" alt="Twitter"/></a>
          <a href="https://instagram.com" target="_blank"><img src="https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png" alt="Instagram"/></a>
          <a href="https://linkedin.com" target="_blank"><img src="https://img.icons8.com/ios-filled/50/ffffff/linkedin.png" alt="LinkedIn"/></a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2025 SRKREC. All Rights Reserved.</p>
    </div>
  </footer>

</body>
</html>
